<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, sans-serif; width: 320px; padding: 16px; margin: 0; }
    h1 { font-size: 16px; margin: 0 0 12px; }
    label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
    input { width: 100%; padding: 8px; margin-bottom: 12px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { width: 100%; padding: 10px; background: #007AFF; color: white; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
    button:disabled { background: #aaa; cursor: default; }
    #status { margin-top: 12px; font-size: 13px; }
    .error { color: #c0392b; }
    .success { color: #27ae60; }
    .event { border: 1px solid #eee; border-radius: 6px; padding: 8px; margin-top: 6px; font-size: 12px; }
    .event b { font-size: 13px; }
    #events { max-height: 200px; overflow-y: auto; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>SIGA → iCloud Sync</h1>

  <label>Apple ID (email)</label>
  <input type="email" id="appleId" placeholder="you@icloud.com" />

  <label>App-specific password</label>
  <input type="password" id="appPassword" placeholder="xxxx-xxxx-xxxx-xxxx" />

  <button id="syncBtn">Fetch &amp; Sync</button>

  <div id="status"></div>
  <div id="events"></div>

  <script src="popup.js"></script>
</body>
</html>
